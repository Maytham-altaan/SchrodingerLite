<script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.4.6/3Dmol-min.js"
        onerror="window._3dmolFail=true"></script>
<script>
function showError(msg) {
  var v = document.getElementById('viewer');
  v.innerHTML = '<div id="err">' + msg + '</div>';
}

function setStatus(msg) {
  var s = document.getElementById('status');
  if (s) s.textContent = msg;
}

window.addEventListener('load', function() {
  setStatus('library check…');

  if (window._3dmolFail || typeof $3Dmol === 'undefined') {
    showError(
      '<b>3Dmol library failed to load.</b><br><br>' +
      'Check your internet connection, or try a different browser ' +
      '(Chrome and Firefox are most reliable for <code>file://</code> pages).'
    );
    return;
  }

  try {
    setStatus('creating viewer…');
    var element = document.getElementById('viewer');
    window.viewer = $3Dmol.createViewer(element, {backgroundColor: '#0b0c10'});

    // Load each model from its base64-encoded script tag
    var tags = document.querySelectorAll('script[type="chemical/x-base64"]');
    if (tags.length === 0) {
      showError('No model data found in HTML.');
      return;
    }
    setStatus('loading ' + tags.length + ' model(s)…');
    for (var i = 0; i < tags.length; i++) {
      var fmt = tags[i].getAttribute('data-format') || 'pdb';
      var text = atob(tags[i].textContent.trim());
      viewer.addModel(text, fmt);
    }

    setStatus('rendering…');
    setStyle('cartoon');
    setTimeout(function() { setStatus(''); document.getElementById('status').style.display = 'none'; }, 800);
  } catch (e) {
    showError('<b>Render error:</b> ' + e.message + '<br><br>' +
              '<pre style="white-space:pre-wrap;font-size:11px">' + (e.stack || '') + '</pre>');
  }
});

function setStyle(s) {
  if (typeof viewer === 'undefined') return;
  viewer.setStyle({}, {});
  if (s === 'cartoon')      viewer.setStyle({hetflag:false}, {cartoon:{color:'spectrum'}});
  else if (s === 'stick')   viewer.setStyle({}, {stick:{}});
  else if (s === 'sphere')  viewer.setStyle({}, {sphere:{scale:0.3}});
  else if (s === 'surface') {
    viewer.setStyle({hetflag:false}, {cartoon:{color:'spectrum'}});
    viewer.addSurface($3Dmol.SurfaceType.VDW, {opacity:0.6, color:'white'}, {hetflag:false});
  }
  viewer.setStyle({hetflag:true}, {stick:{colorscheme:'orangeCarbon'}});
  viewer.zoomTo();
  viewer.render();
}
</script>
